<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Godisnji – Vacation Tracker</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-brand">
      <h1>Godisnji</h1>
      <span class="header-sub">Vacation Days Tracker</span>
    </div>
    <div class="header-right">
      <button id="header-menu-btn" class="btn-ghost header-menu-btn" aria-label="Menu" aria-expanded="false" aria-controls="header-buttons">&#9776;</button>
      <div class="header-buttons" id="header-buttons">
        <button id="export-pdf-btn" class="btn-ghost">Export PDF</button>
        <button id="import-pdf-btn" class="btn-ghost">Import PDF</button>
        <input type="file" id="import-pdf-input" accept="application/pdf" hidden>
        <button id="reset-btn" class="btn-ghost">Reset to defaults</button>
      </div>
      <div class="profile-menu" id="profile-menu">
        <button id="profile-btn" class="profile-btn" aria-label="Profile" aria-haspopup="true" aria-expanded="false" aria-controls="profile-dropdown">
          <span id="profile-avatar" class="profile-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c0-4 3.6-6 8-6s8 2 8 6"></path></svg>
          </span>
        </button>
        <div class="profile-dropdown" id="profile-dropdown">
          <label class="profile-field">
            <span>Name</span>
            <input type="text" id="profile-name-input" placeholder="Your name" autocomplete="name">
          </label>
          <label class="profile-field">
            <span>Employer</span>
            <input type="text" id="profile-employer-input" placeholder="Company" autocomplete="organization">
          </label>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="config-panel">

      <section class="card">
        <div class="section-header">
          <h2>Allowed Vacation Days</h2>
          <div class="header-actions">
            <button id="sort-years-btn" class="btn-sort">Sort</button>
            <button id="add-year-btn" class="btn-add">+ Add Year</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Year</th>
                <th>Days</th>
                <th>Carryover Cutoff <span class="th-hint">DD.MM</span></th>
                <th></th>
              </tr>
            </thead>
            <tbody id="years-body"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Vacations</h2>
          <div class="header-actions">
            <button id="sort-vacations-btn" class="btn-sort">Sort</button>
            <button id="add-vacation-btn" class="btn-add">+ Add</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Start</th>
                <th>End</th>
                <th>Days</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="vacations-body"></tbody>
          </table>
        </div>
      </section>

    </div>

    <div class="results-panel">
      <h2>Results</h2>
      <div id="results-container"></div>
    </div>
  </main>

  <script src="vendor/pdf-lib.min.js"></script>
  <script src="vendor/fontkit.umd.min.js"></script>
  <script src="vendor/pdf-fonts.js"></script>
  <script src="pdf-io.js"></script>
  <script src="app.js"></script>
</body>
</html>
