<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Godisnji – Vacation Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-brand">
      <img src="logo-palm.svg" alt="" class="header-logo">
      <div class="header-text">
        <h1>Godisnji</h1>
        <span class="header-sub">Vacation Days Tracker</span>
      </div>
    </div>
    <button id="header-menu-btn" class="btn-ghost header-menu-btn" aria-label="Menu" aria-expanded="false" aria-controls="header-buttons">&#9776;</button>
    <div class="header-buttons" id="header-buttons">
      <button id="export-pdf-btn" class="btn-ghost">Export PDF</button>
      <button id="import-pdf-btn" class="btn-ghost">Import PDF</button>
      <input type="file" id="import-pdf-input" accept="application/pdf" hidden>
      <button id="reset-btn" class="btn-ghost">Reset to defaults</button>
    </div>
  </header>

  <main>
    <div class="config-panel">

      <section class="card">
        <div class="section-header">
          <h2>Allowed Vacation Days</h2>
          <div class="header-actions">
            <button id="sort-years-btn" class="btn-sort">Sort</button>
            <button id="add-year-btn" class="btn-add">+ Add Year</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Year</th>
                <th>Days</th>
                <th>Carryover Cutoff <span class="th-hint">DD.MM</span></th>
                <th></th>
              </tr>
            </thead>
            <tbody id="years-body"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Vacations</h2>
          <div class="header-actions">
            <button id="sort-vacations-btn" class="btn-sort">Sort</button>
            <button id="add-vacation-btn" class="btn-add">+ Add</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Start</th>
                <th>End</th>
                <th>Days</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="vacations-body"></tbody>
          </table>
        </div>
      </section>

    </div>

    <div class="results-panel">
      <h2>Results</h2>
      <div id="results-container"></div>
    </div>
  </main>

  <script src="vendor/pdf-lib.min.js"></script>
  <script src="pdf-io.js"></script>
  <script src="app.js"></script>
</body>
</html>
